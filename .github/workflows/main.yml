name: AI Daily News Auto Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 北京时间 10:00

jobs:
  run_daily_news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9' # 保持稳定的 3.9 版本
        
    - name: Install dependencies
      # ⚠️ 注意：这里去掉了 python-dotenv，只装核心的3个库
      run: |
        pip install google-generative-ai requests beautifulsoup4
        
    - name: Run script
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      run: python main.py
