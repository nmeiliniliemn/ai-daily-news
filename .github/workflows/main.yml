name: AI Daily News Auto Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 北京时间 10:00

jobs:
  run_daily_news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' 
        
    - name: Install dependencies
      run: |
        # 🛑 核心修复：GitHub 的 pip 26.0.1 版本有 Bug，强制降级到稳定版 23.3.1
        python -m pip install pip==23.3.1
        
        # 打印版本确认一下 (你会看到版本变回了 23.3.1)
        pip --version
        
        # 升级构建工具，防止安装出错
        pip install --upgrade setuptools wheel
        
        # 正式安装库 (使用 -v 参数，如果再错能看到更详细原因，但大概率不会错了)
        pip install -v google-generative-ai requests beautifulsoup4
        
    - name: Run script
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      run: python main.py
