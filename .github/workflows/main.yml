name: AI Daily News Auto Run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 北京时间 10:00

jobs:
  run_daily_news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 🚀 关键升级：从 3.9 升到 3.10，解决兼容性问题
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip # 🚀 关键步骤：强制升级安装工具
        pip install google-generative-ai requests beautifulsoup4
        
    - name: Run script
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      run: python main.py
